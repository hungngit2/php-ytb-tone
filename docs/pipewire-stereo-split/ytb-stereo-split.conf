# Which AirPlay speaker gets which channel for the stereo-split feature.
# Identified by IP (not name) since speaker names/IDs can change but IP
# is stable on this LAN.
MAIN_IP=10.0.1.10
SUB_IP=10.0.1.11

# Two independent AirPlay/RAOP sessions (one per speaker) have no shared
# clock and gradually drift out of L/R sync the longer they stay
# connected. A full reconnect (toggling the OwnTone output off/on) resets
# it. The watcher does that automatically, but only once playback has
# been idle (OwnTone player state != "play") continuously for this many
# minutes — so it never interrupts an active listening session. Empty/0
# disables auto-resync entirely.
IDLE_MINUTES_BEFORE_RESYNC=15
